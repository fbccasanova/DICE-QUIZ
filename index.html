<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flourish 2-Player Controller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --dice-size: 100px;
      --pip-size: 18px;
      --flourish-green: #C1FF72;
      --flourish-pink: #FF66C4;
      --flourish-blue: #00A3FF;
    }

    body {
      background: #05472A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding-top: 15px;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      color: white;
      overflow-x: hidden;
    }

    /* SVG Logo Scaling */
    .logo-image {
      max-width: 550px; 
      width: 90%; 
      height: auto;
      margin-top: 5px;
      margin-bottom: -15px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    #main-control-area {
      display: flex; flex-direction: column;
      align-items: center; width: 100%;
    }

    .players-row {
      display: flex; gap: 12px; margin-bottom: 10px;
      width: calc(100% - 40px); max-width: 380px;
    }
    .player-card {
      flex: 1; background: rgba(255,255,255,0.1);
      border: 2px solid transparent; border-radius: 14px;
      padding: 8px 12px; text-align: center;
      transition: all .25s ease;
    }
    .player-card.active {
      background: rgba(193,255,114,0.18);
      border-color: var(--flourish-green);
    }
    .player-card-name { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; opacity: .7; }
    .player-card-spot { font-size: 1.9rem; font-weight: 800; line-height: 1; }
    .player-card.active .player-card-spot { color: var(--flourish-green); }

    .switch-player-btn {
      background: var(--flourish-green);
      color: #05472A;
      padding: 10px 30px;
      border-radius: 99px;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 1rem;
      box-shadow: 0 4px 0 #89b351;
      margin-bottom: 10px;
      cursor: pointer;
      border: none;
      transition: all 0.1s;
    }
    .switch-player-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #89b351; }
    .switch-player-btn:disabled { opacity: .4; cursor: not-allowed; }

    .scene { width: var(--dice-size); height: var(--dice-size); perspective: 600px; margin: 15px; cursor: pointer; }
    .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1.8s cubic-bezier(0.2, 0.8, 0.3, 1); }
    .cube__face {
      position: absolute; width: var(--dice-size); height: var(--dice-size);
      background: white; border: 2px solid #e2e8f0; border-radius: 16px;
      display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
      padding: 12px; backface-visibility: hidden;
    }
    .pip { width: var(--pip-size); height: var(--pip-size); border-radius: 50%; background-color: #1e293b; justify-self: center; align-self: center; }

    .face-1 { transform: rotateY(0deg) translateZ(50px); }
    .face-2 { transform: rotateY(90deg) translateZ(50px); }
    .face-3 { transform: rotateY(180deg) translateZ(50px); }
    .face-4 { transform: rotateY(-90deg) translateZ(50px); }
    .face-5 { transform: rotateX(90deg) translateZ(50px); }
    .face-6 { transform: rotateX(-90deg) translateZ(50px); }

    #message-box { font-size: 1.1rem; font-weight: 800; text-align: center; margin-bottom: 4px; min-height: 1.6rem; }

    .status-badge {
      font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 99px; margin-bottom: 8px;
      background: rgba(255,255,255,.1); color: rgba(255,255,255,.6);
    }
    .status-badge.fact { background: rgba(0,163,255,0.2); color: var(--flourish-blue); }

    .challenge-overlay, .quiz-overlay {
      display: none; position: fixed; inset: 0; z-index: 95;
      background: rgba(3, 30, 18, 0.95); flex-direction: column;
      align-items: center; justify-content: center; padding: 32px; text-align: center;
    }
    .active { display: flex !important; }

    .challenge-go-btn {
      background: var(--flourish-pink); color: white; padding: 18px 48px;
      border-radius: 99px; font-weight: 800; text-transform: uppercase; margin-top: 15px;
    }
  </style>
</head>
<body>

  <img src="Flourish Board Gane (12 x 12 in) (164 x 164 px) (1000 x 1000 px).svg" 
       alt="Flourish" class="logo-image">

  <div class="players-row">
    <div class="player-card active" id="card-p1">
      <div class="player-card-name">Player 1</div>
      <div class="player-card-spot" id="spot-p1">0</div>
    </div>
    <div class="player-card" id="card-p2">
      <div class="player-card-name">Player 2</div>
      <div class="player-card-spot" id="spot-p2">0</div>
    </div>
  </div>

  <div id="main-control-area">
    <button class="switch-player-btn" id="switch-btn" onclick="togglePlayer()">Switch Player</button>
    <div id="message-box">Player 1's Turn</div>
    <div class="status-badge" id="status-badge">Ready to roll!</div>

    <div class="scene" id="dice-scene" onclick="rollDice()">
      <div id="dice" class="cube">
        <div class="cube__face face-1" style="grid-template-areas: '. . .' '. d .' '. . .'"><span class="pip" style="grid-area: d"></span></div>
        <div class="cube__face face-6">
            <span class="pip"></span><span class="pip"></span><span class="pip"></span>
            <span class="pip"></span><span class="pip"></span><span class="pip"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="challenge-overlay" id="challenge-overlay">
    <h2 class="text-2xl font-bold text-pink-500">CHALLENGE!</h2>
    <button class="challenge-go-btn" onclick="launchQuiz()">Open Challenge →</button>
  </div>

  <div class="quiz-overlay" id="quiz-overlay">
    <p>Waiting for quiz result...</p>
    <button onclick="cancelQuiz()" class="mt-4 opacity-50 underline">Cancel</button>
  </div>

<script>
  // --- HOVERLAY SYSTEM TRIGGERS ---
  const HQ = {
    add(trigger) {
      try {
        const f = document.createElement('iframe');
        f.style.cssText = 'display:none;width:0;height:0;';
        f.src = `space://do?action=send_event&event_message=${encodeURIComponent(trigger)}`;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 1000);
      } catch(_) {}
    }
  };

  // --- AUDIO LOGIC ---
  let musicStarted = false;

  function initMusic() {
    if (!musicStarted) {
      HQ.add('play-main-music'); 
      musicStarted = true;
    }
  }

  function switchToQuizMusic() {
    HQ.add('stop-main-music'); 
    setTimeout(() => { HQ.add('play-quiz-music'); }, 100); 
  }

  function switchToMainMusic() {
    HQ.add('stop-quiz-music'); 
    setTimeout(() => { HQ.add('play-main-music'); }, 100);
  }

  // --- GAME CONFIG ---
  const CONFIG = { WIN_SPOT: 20, FACT_DELAY: 10000, DICE_ANIM_MS: 1800 };
  const SPECIAL_SPOTS = {
    2: { type: 'fact', label: '💡 FUN FACT: Dark Greens' },
    8: { type: 'fact', label: '💡 FUN FACT: Dehydration' },
    10: { type: 'challenge', bonus: 1 },
    13: { type: 'fact', label: '💡 FUN FACT: Whole Grains' },
    15: { type: 'challenge', bonus: 2 }
  };

  let currentPlayer = 1;
  let positions = { 1: 0, 2: 0 };
  let isRolling = false;
  let currentX = 0, currentY = 0;

  function updateUI() {
    document.getElementById('spot-p1').textContent = positions[1];
    document.getElementById('spot-p2').textContent = positions[2];
    document.getElementById('card-p1').classList.toggle('active', currentPlayer === 1);
    document.getElementById('card-p2').classList.toggle('active', currentPlayer === 2);
    document.getElementById('message-box').textContent = `Player ${currentPlayer}'s Turn`;
  }

  async function rollDice() {
    if (isRolling) return;
    initMusic();
    isRolling = true;
    
    const result = Math.floor(Math.random() * 6) + 1;
    currentX += 720; currentY += 720;
    document.getElementById('dice').style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;

    setTimeout(async () => {
      positions[currentPlayer] = Math.min(CONFIG.WIN_SPOT, positions[currentPlayer] + result);
      HQ.add(`spot-${positions[currentPlayer]}`);
      updateUI();
      await processSpot(positions[currentPlayer]);
      isRolling = false;
    }, CONFIG.DICE_ANIM_MS);
  }

  async function processSpot(spot) {
    const special = SPECIAL_SPOTS[spot];
    if (!special) return;

    if (special.type === 'fact') {
      document.getElementById('status-badge').textContent = special.label;
      document.getElementById('status-badge').classList.add('fact');
      HQ.add(`show-fact-${spot}`);
      await new Promise(r => setTimeout(r, CONFIG.FACT_DELAY));
      HQ.add(`hide-fact-${spot}`);
      document.getElementById('status-badge').classList.remove('fact');
      document.getElementById('status-badge').textContent = 'Ready to roll!';
    } 
    else if (special.type === 'challenge') {
      document.getElementById('challenge-overlay').classList.add('active');
    }
  }

  function togglePlayer() {
    if (isRolling) return;
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    // CRITICAL: Jump the AR indicator to the new player's spot
    HQ.add(`spot-${positions[currentPlayer]}`); 
    HQ.add(`active-player-${currentPlayer}`);
    updateUI();
  }

  function launchQuiz() {
    switchToQuizMusic();
    document.getElementById('challenge-overlay').classList.remove('active');
    document.getElementById('quiz-overlay').classList.add('active');
    window.open('flourish-quiz.html', '_blank');
  }

  function cancelQuiz() {
    switchToMainMusic();
    document.getElementById('quiz-overlay').classList.remove('active');
  }

  // Listener for Quiz Results from localStorage
  window.addEventListener('storage', (e) => {
    if (e.key === 'frd_quiz_result') {
      const res = JSON.parse(e.newValue);
      switchToMainMusic();
      document.getElementById('quiz-overlay').classList.remove('active');
      if (res.correct) {
        positions[currentPlayer] = Math.min(CONFIG.WIN_SPOT, positions[currentPlayer] + 1);
        HQ.add(`spot-${positions[currentPlayer]}`);
        updateUI();
      }
      localStorage.removeItem('frd_quiz_result');
    }
  });

  updateUI();
</script>
</body>
</html>
